<!DOCTYPE html>
<html>
<head>
    <title>Blind Auction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏆 Blind Auction System</h1>

    <div class="card">

        <input type="text" id="name" placeholder="Enter Name">

        <input type="number" id="bid" placeholder="Enter Bid Amount">

        <button onclick="addBid()">Place Bid</button>

    </div>

    <div class="card">

        <h2>Current Bids</h2>

        <ul id="bidList"></ul>

    </div>

    <div class="card">

        <button class="winner-btn" onclick="findWinner()">
            End Auction
        </button>

        <h2 id="result"></h2>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
